
<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <title> Travel Vista </title>
        <th:block th:fragment="css">
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
            <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        </th:block>
        
    </head>

    <body>
        <header  th:fragment="header">
            <nav class="navbar navbar-expand-sm bg-light">
                <div class="container-fluid">
                    <ul class="navbar-nav">
                        <li class="navbar-brand" href="#">
                            Trang Chủ
                        </li>
                        <li class="nav-item" th:each="c : ${categories}">
                            <a class="nav-link" href="#"
                               th:text="${c.name}">
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
             <h1>Welcome to our website</h1>
        </header>
        
        
       
        <section class="container" >
            
            <div class="mt-2">
                <a href="#" class="btn btn-info">
                    Thêm sản phẩm
                </a>
            </div>
            
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th></th>
                        <th>Tên sản phẩm</th>
                        <th>Giá bán</th>
                        <th></th>

                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p: ${products}">
                        <td>
                            <img th:src="${p.image}" width="200"/>
                        </td>
                        <td th:text="${p.name}"></td>
                        <td th:text="${p.price} +'VNĐ' "></td>
                        <td>
                            <a href="#" class="btn btn-info">Cập nhập</a>
                            <button class="btn btn-danger">Xóa</button>
                        </td>
                    </tr>
                   
                </tbody>
            </table>
        </section>
        <footer th:fragment="footer">
            <div class="alert alert-info">
                TravelVista Website &copy: 2026
            </div>
        </footer>
    </body>
</html>
